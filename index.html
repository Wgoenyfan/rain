---
layout: default
title: 首页
---
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>{{ site.title }}</title>
<style>
body {
    margin: 60px auto;
    max-width: 900px;
    padding: 0 20px;
    font-family: system-ui, sans-serif;
}
/* 主标题Rain 黑色无链接 */
h1 {
    font-size: 48px;
    margin: 0 0 10px 0;
    color: #000;
}
hr {
    border: none;
    border-top: 1px solid #ddd;
    margin: 12px 0 24px 0;
}
.desc {
    font-size: 22px;
    color: #333;
    margin: 0 0 36px 0;
}
h2 {
    font-size: 36px;
    margin: 0 0 12px 0;
    color: #000;
}
.post-item {
    margin: 24px 0;
}
/* 文章标题链接：蓝色，默认无下划线 */
.post-item h3 a {
    font-size: 32px;
    color: #2563eb;
    text-decoration: none;
}
/* 鼠标悬浮才出现下划线 */
.post-item h3 a:hover {
    text-decoration: underline;
}
.post-date {
    font-size: 20px;
    color: #444;
    margin-top: 8px;
    display: block;
}
</style>
</head>
<body>
  <!-- 只保留1个黑色主标题，不带链接 -->
  <h1>{{ site.title }}</h1>
  <hr>
  <p class="desc">{{ site.description }}</p>

  <h2>文章列表</h2>
  <hr>

  {% for post in site.posts %}
    <div class="post-item">
      <h3><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
</h3>
      <span class="post-date">{{ post.date | date: "%Y-%m-%d" }}</span>
    </div>
  {% endfor %}
</body>
</html>
