---
layout: default
title: 首页
---
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ site.title }}</title>
</head>
<body>
  <h1>{{ site.title }}</h1>
  <p>{{ site.description }}</p>

  <h2>文章列表</h2>
  {% for post in site.posts %}
    <div>
      <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
      <time>{{ post.date | date: "%Y-%m-%d" }}</time>
      <p>{{ post.excerpt }}</p>
    </div>
  {% endfor %}
</body>
</html>
