---
layout: default
title: 首页
---
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>{{ site.title }}</title>
</head>
<body>
  <h1>{{ site.title }}</h1>
  <p>{{ site.description }}</p>

  <h2>文章列表</h2>
  {% for post in site.posts %}
    <div style="margin:10px 0;">
      <!-- 只保留标题链接，点击进入详情页 -->
      <h3>
        <a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a>
      </h3>
      <span>{{ post.date | date: "%Y-%m-%d" }}</span>
    </div>
  {% endfor %}
</body>
</html>
